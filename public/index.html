<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lincoln Labs — Revenue Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f0f0e; --surface: #191917; --border: #2a2a27;
    --text: #e8e6e0; --muted: #7a7870;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 40px 48px; }

  header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border); }
  .header-left h1 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 2.4rem; letter-spacing: -0.02em; line-height: 1; }
  .header-left h1 em { font-style: italic; color: var(--muted); }
  .header-left p { margin-top: 6px; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
  .auth-area { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; }
  .btn { display: flex; align-items: center; gap: 8px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.75rem; padding: 10px 18px; cursor: pointer; letter-spacing: 0.05em; text-decoration: none; transition: border-color 0.2s; }
  .btn:hover { border-color: var(--muted); }
  .btn.primary { border-color: #4ade80; color: #4ade80; }
  .btn.primary:hover { background: #4ade8010; }
  #authStatus { font-size: 0.68rem; color: var(--muted); }
  #lastUpdated { font-size: 0.68rem; color: var(--muted); }

  /* Loading */
  #loadingState { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 16px; }
  .spinner { width: 32px; height: 32px; border: 2px solid var(--border); border-top-color: #4ade80; border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #loadingState p { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.05em; }
  #loadingStep { font-size: 0.68rem; color: var(--border); letter-spacing: 0.04em; }

  /* Login prompt */
  #loginPrompt { display: none; flex-direction: column; align-items: center; justify-content: center; padding: 80px; gap: 20px; text-align: center; }
  #loginPrompt h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.8rem; }
  #loginPrompt p { font-size: 0.75rem; color: var(--muted); max-width: 360px; line-height: 1.7; }

  /* Error */
  #errorState { display: none; padding: 20px 24px; background: #2a1515; border: 1px solid #5a2020; font-size: 0.75rem; color: #f87171; margin-bottom: 24px; }
  #errorState .error-body { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
  #errorState .error-msg { line-height: 1.6; }
  #errorState .error-actions { display: flex; gap: 8px; flex-shrink: 0; }
  #errorState .error-actions a { font-size: 0.72rem; padding: 7px 14px; border: 1px solid #5a2020; color: #f87171; text-decoration: none; transition: border-color 0.2s; white-space: nowrap; }
  #errorState .error-actions a:hover { border-color: #f87171; }

  /* Tabs */
  .tabs { display: flex; gap: 0; margin-bottom: 24px; border-bottom: 1px solid var(--border); }
  .tab { padding: 10px 24px; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px; transition: color 0.15s, border-color 0.15s; }
  .tab.active { color: var(--text); border-bottom-color: var(--text); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  /* Legend */
  .legend { display: flex; gap: 24px; flex-wrap: wrap; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; letter-spacing: 0.04em; color: var(--muted); cursor: pointer; transition: color 0.15s; user-select: none; }
  .legend-item:hover { color: var(--text); }
  .legend-item.hidden { opacity: 0.3; }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* Chart */
  .chart-wrapper { position: relative; background: var(--surface); border: 1px solid var(--border); padding: 28px 28px 16px; }
  canvas { display: block; width: 100%; }

  /* Stats row */
  .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 1px; margin-top: 1px; background: var(--border); }
  .stat-card { background: var(--surface); padding: 18px 20px; }
  .stat-label { font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .stat-val { font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.35rem; letter-spacing: -0.02em; line-height: 1; }
  .stat-sub { font-size: 0.62rem; color: var(--muted); margin-top: 4px; letter-spacing: 0.03em; }

  /* Current period chart */
  .period-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .period-header h2 { font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.4rem; }
  .period-dates { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.04em; }
  .period-legend { display: flex; gap: 24px; margin-bottom: 16px; font-size: 0.7rem; color: var(--muted); }
  .period-legend-item { display: flex; align-items: center; gap: 8px; }
  .period-legend-swatch { width: 24px; height: 10px; border-radius: 2px; }

  /* Tooltip */
  #tooltip { position: fixed; pointer-events: none; opacity: 0; transition: opacity 0.12s; z-index: 100; background: #111110; border: 1px solid var(--border); padding: 12px 16px; min-width: 240px; }
  #tooltip.visible { opacity: 1; }
  .tt-month { font-size: 0.7rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .tt-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; font-size: 0.72rem; padding: 3px 0; }
  .tt-label { display: flex; align-items: center; gap: 6px; color: var(--muted); }
  .tt-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .tt-val { font-size: 0.75rem; color: var(--text); white-space: nowrap; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Lincoln Labs <em>Revenue</em></h1>
    <p id="headerSub">Loading live data from QuickBooks…</p>
  </div>
  <div class="auth-area">
    <div id="authButtons"></div>
    <span id="lastUpdated"></span>
  </div>
</header>

<div id="errorState"></div>
<div id="loginPrompt">
  <h2>Connect to <em>QuickBooks</em></h2>
  <p>Sign in with your QuickBooks Online account to load live revenue data.</p>
  <a href="/auth/login" class="btn primary">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/></svg>
    Connect QuickBooks
  </a>
</div>

<div id="loadingState">
  <div class="spinner"></div>
  <p id="loadingMsg">Checking authentication…</p>
  <span id="loadingStep"></span>
</div>

<div id="dashboardContent" style="display:none">
  <div class="tabs">
    <div class="tab active" data-tab="trend">Monthly Trend</div>
    <div class="tab" data-tab="current">Current Period</div>
  </div>

  <!-- Tab 1: Monthly Trend -->
  <div id="tab-trend" class="tab-content active">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div class="legend" id="legend" style="margin-bottom:0;flex:1;"></div>
      <button id="currentMonthToggle" class="btn" onclick="toggleCurrentMonth()" style="font-size:0.68rem;padding:7px 14px;white-space:nowrap;flex-shrink:0;margin-left:16px;">Show Current Month</button>
    </div>
    <div class="chart-wrapper">
      <canvas id="trendChart"></canvas>
    </div>
    <div class="stats-row" id="statsRow"></div>
  </div>

  <!-- Tab 2: Current Period Comparison -->
  <div id="tab-current" class="tab-content">
    <div class="period-header">
      <h2>Revenue <em>to Date</em></h2>
      <div class="period-dates" id="periodDates"></div>
    </div>
    <div class="period-legend">
      <div class="period-legend-item">
        <div class="period-legend-swatch" style="background:#e8e6e0;opacity:0.9"></div>
        <span id="currentPeriodLabel">Current month to date</span>
      </div>
      <div class="period-legend-item">
        <div class="period-legend-swatch" style="background:#e8e6e060;border:1px dashed #7a7870"></div>
        <span id="priorPeriodLabel">Same days last month</span>
      </div>
    </div>
    <div class="chart-wrapper">
      <canvas id="comparisonChart"></canvas>
    </div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-month" id="ttMonth"></div>
  <div id="ttRows"></div>
</div>

<script>
// ─── Series config ────────────────────────────────────────────────────────────
const SERIES_CONFIG = [
  { key: 'civille',         label: 'Civille + Phantom Copy',              color: '#22c55e', dash: [],    periodLabel: 'Civille' },
  { key: 'awesomeapi',      label: 'AwesomeAPI',                           color: '#eab308', dash: [],    periodLabel: null },
  { key: 'truss_sal_delta', label: 'Truss Client Salaries (Income − Exp)', color: '#a855f7', dash: [],    periodLabel: 'Truss Salaries Delta' },
  { key: 'truss_svc_rec',   label: 'Truss Svc Fees + Recruitment',         color: '#3b82f6', dash: [],    periodLabel: 'Truss Service Fees' },
  { key: 'lincoln_labs',    label: 'Lincoln Labs Total',                   color: '#e5e5e5', dash: [4,4], periodLabel: 'Lincoln Labs' },
];

const MARGIN = { top: 24, right: 32, bottom: 52, left: 72 };
let hidden = new Set();
let hoveredMonth = null;
let trendData = null;
let periodData = null;
let showCurrentMonth = false; // default: hide the current incomplete month

// The subset of trendData that was actually rendered (respects showCurrentMonth slice).
// Tooltip and hover-index math must use these — not raw trendData — so labels and
// values are always in sync with what the user sees.
let displayedMonths = [];
let displayedSeries = {};

function toggleCurrentMonth() {
  showCurrentMonth = !showCurrentMonth;
  const btn = document.getElementById('currentMonthToggle');
  btn.textContent = showCurrentMonth ? 'Hide Current Month' : 'Show Current Month';
  btn.style.borderColor = showCurrentMonth ? '#eab308' : '';
  btn.style.color = showCurrentMonth ? '#eab308' : '';
  buildStats();
  drawTrendChart();
}

// ─── Formatting ───────────────────────────────────────────────────────────────
function fmt(v) {
  if (v === null || v === undefined) return '—';
  const neg = v < 0;
  const s = '$' + Math.abs(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  return neg ? `(${s})` : s;
}

function fmtK(v) {
  if (v === 0) return '$0';
  const abs = Math.abs(v), sign = v < 0 ? '-' : '';
  if (abs >= 1000000) return sign + '$' + (abs/1000000).toFixed(1) + 'M';
  if (abs >= 100000)  return sign + '$' + Math.round(abs/1000) + 'K';
  if (abs >= 1000)    return sign + '$' + (abs/1000).toFixed(1) + 'K';
  return sign + '$' + abs.toFixed(0);
}

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function checkAuth() {
  const res = await fetch('/auth/status');
  const { authenticated } = await res.json();
  const btns = document.getElementById('authButtons');
  if (authenticated) {
    btns.innerHTML = `<a href="/auth/logout" class="btn">Disconnect QBO</a>`;
    document.getElementById('headerSub').textContent = 'Live data · QuickBooks Online';
    return true;
  } else {
    btns.innerHTML = `<a href="/auth/login" class="btn primary">Connect QuickBooks</a>`;
    return false;
  }
}

// ─── Error display ────────────────────────────────────────────────────────────
function showError(msg, { showReconnect = false } = {}) {
  document.getElementById('loadingState').style.display = 'none';
  const errEl = document.getElementById('errorState');
  errEl.style.display = 'block';
  const reconnectBtn = showReconnect
    ? `<a href="/auth/login">Reconnect QuickBooks</a>` : '';
  errEl.innerHTML = `
    <div class="error-body">
      <span class="error-msg">${msg}</span>
      <span class="error-actions">
        <a href="javascript:location.reload()">Retry</a>
        ${reconnectBtn}
      </span>
    </div>`;
}

function setLoadingMsg(msg, step = '') {
  document.getElementById('loadingMsg').textContent = msg;
  document.getElementById('loadingStep').textContent = step;
}

// ─── Data loading ─────────────────────────────────────────────────────────────
async function loadAll() {
  document.getElementById('loadingState').style.display = 'flex';
  document.getElementById('dashboardContent').style.display = 'none';
  document.getElementById('loginPrompt').style.display = 'none';
  document.getElementById('errorState').style.display = 'none';

  // Surface OAuth errors passed back as query params
  const params = new URLSearchParams(location.search);
  if (params.get('error') === 'auth_failed') {
    showError('QuickBooks authentication failed. Please try connecting again.', { showReconnect: true });
    document.getElementById('loginPrompt').style.display = 'none';
    return;
  }

  setLoadingMsg('Checking authentication…');
  const authed = await checkAuth();
  if (!authed) {
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('loginPrompt').style.display = 'flex';
    return;
  }

  try {
    setLoadingMsg('Loading revenue data…', 'Fetching monthly history');
    const [monthlyRes, currentRes] = await Promise.all([
      fetch('/api/monthly'),
      fetch('/api/current-period'),
    ]);

    if (monthlyRes.status === 401 || currentRes.status === 401) {
      showError('Your QuickBooks session expired. Please reconnect to continue.', { showReconnect: true });
      return;
    }

    setLoadingMsg('Loading revenue data…', 'Processing results');
    const [monthly, current] = await Promise.all([monthlyRes.json(), currentRes.json()]);

    if (monthly.error || current.error) {
      throw new Error(monthly.error || current.error);
    }

    trendData = monthly;
    periodData = current;

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('dashboardContent').style.display = 'block';
    document.getElementById('lastUpdated').textContent = 'Updated ' + new Date().toLocaleTimeString();

    buildLegend();
    buildStats();
    drawTrendChart();
    drawComparisonChart();
  } catch (err) {
    showError('Failed to load data: ' + err.message, { showReconnect: true });
  }
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById('tab-' + tab.dataset.tab).classList.add('active');
    if (tab.dataset.tab === 'trend') drawTrendChart();
    if (tab.dataset.tab === 'current') drawComparisonChart();
  });
});

// ─── Legend ───────────────────────────────────────────────────────────────────
function buildLegend() {
  const el = document.getElementById('legend');
  el.innerHTML = '';
  SERIES_CONFIG.forEach(s => {
    const item = document.createElement('div');
    item.className = 'legend-item' + (hidden.has(s.key) ? ' hidden' : '');
    item.innerHTML = `<div class="legend-dot" style="background:${s.color}"></div>${s.label}`;
    item.addEventListener('click', () => {
      if (hidden.has(s.key)) hidden.delete(s.key); else hidden.add(s.key);
      item.classList.toggle('hidden');
      const card = document.querySelector(`.stat-card[data-key="${s.key}"]`);
      if (card) card.style.display = hidden.has(s.key) ? 'none' : '';
      drawTrendChart();
    });
    el.appendChild(item);
  });
}

// ─── Stats ────────────────────────────────────────────────────────────────────
function buildStats() {
  const el = document.getElementById('statsRow');
  el.innerHTML = '';
  SERIES_CONFIG.forEach(s => {
    const raw = trendData.series[s.key] || [];
    const vals = (showCurrentMonth ? raw : raw.slice(0, -1)).filter(v => v !== null);
    const latest = vals[vals.length - 1];
    const prev = vals[vals.length - 2];
    let pctDisplay = '';
    if (prev !== null && prev !== undefined && latest !== null && latest !== undefined) {
      if (prev < 0 && latest >= 0) {
        pctDisplay = `<span style="color:#4ade80">↑ N/M (negative → positive)</span>`;
      } else if (prev >= 0 && latest < 0) {
        pctDisplay = `<span style="color:#f87171">↓ N/M (positive → negative)</span>`;
      } else if (prev < 0 && latest < 0) {
        const pct = ((latest - prev) / Math.abs(prev)) * 100;
        const better = latest > prev;
        pctDisplay = `<span style="color:${better ? '#4ade80' : '#f87171'}">${better ? '↑' : '↓'} ${Math.abs(pct).toFixed(1)}% vs prior month</span>`;
      } else {
        const pct = ((latest - prev) / prev) * 100;
        pctDisplay = `<span style="color:${pct >= 0 ? '#4ade80' : '#f87171'}">${pct >= 0 ? '↑' : '↓'} ${Math.abs(pct).toFixed(1)}% vs prior month</span>`;
      }
    }
    const card = document.createElement('div');
    card.className = 'stat-card';
    card.setAttribute('data-key', s.key);
    if (hidden.has(s.key)) card.style.display = 'none';
    card.innerHTML = `
      <div class="stat-label"><div class="stat-dot" style="background:${s.color}"></div><span style="color:var(--muted)">${s.label}</span></div>
      <div class="stat-val" style="color:${s.color}">${fmt(latest)}</div>
      <div class="stat-sub">${pctDisplay}</div>
    `;
    el.appendChild(card);
  });
}

// ─── Trend Chart ──────────────────────────────────────────────────────────────
const trendCanvas = document.getElementById('trendChart');
const trendCtx = trendCanvas.getContext('2d');

function drawTrendChart() {
  if (!trendData) return;
  // Slice off the last (current, incomplete) month unless the toggle is on.
  const months = showCurrentMonth ? trendData.months : trendData.months.slice(0, -1);
  const series = {};
  for (const key of Object.keys(trendData.series)) {
    series[key] = showCurrentMonth ? trendData.series[key] : trendData.series[key].slice(0, -1);
  }
  // Keep a reference so the tooltip always reads from the same slice that was drawn.
  displayedMonths = months;
  displayedSeries = series;
  const n = months.length;
  const wrapper = trendCanvas.parentElement;
  const W = wrapper.clientWidth - 56;
  const H = Math.max(380, Math.round(W * 0.38));
  trendCanvas.width = W * devicePixelRatio;
  trendCanvas.height = H * devicePixelRatio;
  trendCanvas.style.width = W + 'px';
  trendCanvas.style.height = H + 'px';
  trendCtx.scale(devicePixelRatio, devicePixelRatio);

  const plotW = W - MARGIN.left - MARGIN.right;
  const plotH = H - MARGIN.top - MARGIN.bottom;
  trendCtx.clearRect(0, 0, W, H);

  let dataMax = 0, dataMin = 0;
  SERIES_CONFIG.forEach(s => {
    if (hidden.has(s.key)) return;
    (series[s.key] || []).forEach(v => {
      if (v !== null) { dataMax = Math.max(dataMax, v); dataMin = Math.min(dataMin, v); }
    });
  });
  const yMax = Math.ceil((dataMax * 1.08) / 10000) * 10000 || 100000;
  const yMin = dataMin < 0 ? Math.floor((dataMin * 1.1) / 10000) * 10000 : 0;
  const yRange = yMax - yMin || 100000;
  const rawStep = yRange / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const niceSteps = [1, 2, 2.5, 5, 10].map(f => f * mag);
  const yStep = niceSteps.find(s => yRange / s <= 8) || niceSteps[niceSteps.length - 1];
  const yTicks = [];
  for (let t = yMin; t <= yMax; t += yStep) yTicks.push(t);

  trendCtx.font = `10px 'DM Mono', monospace`;
  yTicks.forEach(t => {
    const y = MARGIN.top + plotH - ((t - yMin) / yRange) * plotH;
    trendCtx.strokeStyle = t === 0 ? '#3a3a37' : '#2a2a27';
    trendCtx.lineWidth = t === 0 ? 1.5 : 1;
    trendCtx.beginPath(); trendCtx.moveTo(MARGIN.left, y); trendCtx.lineTo(MARGIN.left + plotW, y); trendCtx.stroke();
    trendCtx.fillStyle = '#7a7870'; trendCtx.textAlign = 'right';
    trendCtx.fillText(fmtK(t), MARGIN.left - 8, y + 3.5);
  });

  // X axis
  const step = Math.ceil(n / 18);
  trendCtx.fillStyle = '#7a7870'; trendCtx.textAlign = 'center';
  months.forEach((m, i) => {
    if (i % step !== 0 && i !== n - 1) return;
    const x = MARGIN.left + (i / (n - 1)) * plotW;
    const parts = m.replace(' 20', '\n20').split('\n');
    parts.forEach((l, li) => trendCtx.fillText(l, x, H - MARGIN.bottom + 16 + li * 13));
  });

  trendHitPoints = [];

  SERIES_CONFIG.forEach(s => {
    if (hidden.has(s.key)) return;
    const vals = series[s.key] || [];
    trendCtx.strokeStyle = s.color; trendCtx.lineWidth = 2; trendCtx.setLineDash(s.dash);
    trendCtx.beginPath();
    let started = false;
    vals.forEach((v, i) => {
      if (v === null) return;
      const x = MARGIN.left + (i / (n - 1)) * plotW;
      const y = MARGIN.top + plotH - ((v - yMin) / yRange) * plotH;
      if (!started) { trendCtx.moveTo(x, y); started = true; } else trendCtx.lineTo(x, y);
    });
    trendCtx.stroke(); trendCtx.setLineDash([]);

    vals.forEach((v, i) => {
      if (v === null) return;
      const x = MARGIN.left + (i / (n - 1)) * plotW;
      const y = MARGIN.top + plotH - ((v - yMin) / yRange) * plotH;
      const isHov = hoveredMonth === i;
      trendCtx.beginPath(); trendCtx.arc(x, y, isHov ? 5.5 : 3.5, 0, Math.PI * 2);
      trendCtx.fillStyle = isHov ? s.color : '#191917'; trendCtx.strokeStyle = s.color; trendCtx.lineWidth = 2;
      trendCtx.fill(); trendCtx.stroke();
      trendHitPoints.push({ x, y, i, key: s.key, val: v });
    });
  });

  if (hoveredMonth !== null) {
    const x = MARGIN.left + (hoveredMonth / (n - 1)) * plotW;
    trendCtx.strokeStyle = '#3a3a37'; trendCtx.lineWidth = 1; trendCtx.setLineDash([3, 3]);
    trendCtx.beginPath(); trendCtx.moveTo(x, MARGIN.top); trendCtx.lineTo(x, MARGIN.top + plotH); trendCtx.stroke();
    trendCtx.setLineDash([]);
  }
}

let trendHitPoints = [];

trendCanvas.addEventListener('mousemove', e => {
  const rect = trendCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const n = displayedMonths.length || 1;
  const plotW = trendCanvas.clientWidth - MARGIN.left - MARGIN.right;
  let closest = null, minDist = Infinity;
  for (let i = 0; i < n; i++) {
    const x = MARGIN.left + (i / (n - 1)) * plotW;
    const d = Math.abs(mx - x);
    if (d < minDist) { minDist = d; closest = i; }
  }
  if (closest !== null && minDist < 40) {
    if (hoveredMonth !== closest) { hoveredMonth = closest; drawTrendChart(); }
    showTooltip(e.clientX, e.clientY, closest);
  } else {
    if (hoveredMonth !== null) { hoveredMonth = null; drawTrendChart(); }
    hideTooltip();
  }
});
trendCanvas.addEventListener('mouseleave', () => { hoveredMonth = null; drawTrendChart(); hideTooltip(); });

function showTooltip(mx, my, i) {
  document.getElementById('ttMonth').textContent = displayedMonths[i];
  const rows = document.getElementById('ttRows');
  rows.innerHTML = '';
  SERIES_CONFIG.forEach(s => {
    if (hidden.has(s.key)) return;
    const v = (displayedSeries[s.key] || [])[i];
    if (v === null || v === undefined) return;
    const row = document.createElement('div');
    row.className = 'tt-row';
    row.innerHTML = `<span class="tt-label"><span class="tt-dot" style="background:${s.color}"></span>${s.label}</span><span class="tt-val">${fmt(v)}</span>`;
    rows.appendChild(row);
  });
  const tt = document.getElementById('tooltip');
  const ttW = 280;
  let left = mx + 16, top = my - 20;
  if (left + ttW > window.innerWidth - 8) left = mx - ttW - 16;
  if (top + 200 > window.innerHeight - 8) top = window.innerHeight - 200 - 8;
  tt.style.left = left + 'px'; tt.style.top = top + 'px';
  tt.classList.add('visible');
}
function hideTooltip() { document.getElementById('tooltip').classList.remove('visible'); }

// ─── Comparison Bar Chart ─────────────────────────────────────────────────────
const compCanvas = document.getElementById('comparisonChart');
const compCtx = compCanvas.getContext('2d');

function drawComparisonChart() {
  if (!periodData) return;
  const { comparison, currentPeriod, priorPeriod, dayOfMonth } = periodData;

  // Update labels
  const fmtDate = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  document.getElementById('periodDates').textContent =
    `${fmtDate(currentPeriod.start)}–${fmtDate(currentPeriod.end)}  vs  ${fmtDate(priorPeriod.start)}–${fmtDate(priorPeriod.end)}`;
  document.getElementById('currentPeriodLabel').textContent =
    `${new Date(currentPeriod.start + 'T12:00:00').toLocaleDateString('en-US',{month:'long'})} 1–${dayOfMonth}`;
  document.getElementById('priorPeriodLabel').textContent =
    `${new Date(priorPeriod.start + 'T12:00:00').toLocaleDateString('en-US',{month:'long'})} 1–${dayOfMonth}`;

  const keys = SERIES_CONFIG.filter(s => s.periodLabel !== null).map(s => s.key);
  const wrapper = compCanvas.parentElement;
  const W = wrapper.clientWidth - 56;
  const H = Math.max(360, Math.round(W * 0.35));
  compCanvas.width = W * devicePixelRatio;
  compCanvas.height = H * devicePixelRatio;
  compCanvas.style.width = W + 'px';
  compCanvas.style.height = H + 'px';
  compCtx.scale(devicePixelRatio, devicePixelRatio);

  const plotW = W - MARGIN.left - MARGIN.right;
  const plotH = H - MARGIN.top - MARGIN.bottom;
  compCtx.clearRect(0, 0, W, H);

  // Y scale
  let dataMax = 0, dataMin = 0;
  keys.forEach(k => {
    const c = comparison[k];
    if (!c) return;
    dataMax = Math.max(dataMax, c.current, c.previous);
    dataMin = Math.min(dataMin, c.current, c.previous);
  });
  const yMax = Math.ceil((dataMax * 1.12) / 10000) * 10000 || 50000;
  const yMin = dataMin < 0 ? Math.floor((dataMin * 1.1) / 10000) * 10000 : 0;
  const yRange = yMax - yMin || 50000;
  const rawStep = yRange / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const niceSteps = [1, 2, 2.5, 5, 10].map(f => f * mag);
  const yStep = niceSteps.find(s => yRange / s <= 8) || niceSteps[niceSteps.length - 1];
  const yTicks = [];
  for (let t = yMin; t <= yMax; t += yStep) yTicks.push(t);

  compCtx.font = `10px 'DM Mono', monospace`;
  yTicks.forEach(t => {
    const y = MARGIN.top + plotH - ((t - yMin) / yRange) * plotH;
    compCtx.strokeStyle = t === 0 ? '#3a3a37' : '#2a2a27';
    compCtx.lineWidth = t === 0 ? 1.5 : 1;
    compCtx.beginPath(); compCtx.moveTo(MARGIN.left, y); compCtx.lineTo(MARGIN.left + plotW, y); compCtx.stroke();
    compCtx.fillStyle = '#7a7870'; compCtx.textAlign = 'right';
    compCtx.fillText(fmtK(t), MARGIN.left - 8, y + 3.5);
  });

  // Grouped bars
  const groupCount = keys.length;
  const groupW = plotW / groupCount;
  const barPad = groupW * 0.15;
  const barW = (groupW - barPad * 2) / 2 - 2;
  const zero = MARGIN.top + plotH - ((0 - yMin) / yRange) * plotH;

  // Store bar hit areas for tooltip
  compHitBars = [];

  keys.forEach((k, gi) => {
    const config = SERIES_CONFIG.find(s => s.key === k);
    const c = comparison[k];
    if (!c) return;

    const groupX = MARGIN.left + gi * groupW + barPad;

    // Current bar (solid)
    const curY = MARGIN.top + plotH - ((Math.max(c.current, 0) - yMin) / yRange) * plotH;
    const curH = Math.abs(((c.current - 0) / yRange) * plotH);
    compCtx.fillStyle = config.color;
    compCtx.globalAlpha = 0.9;
    compCtx.fillRect(groupX, Math.min(curY, zero), barW, Math.max(curH, 1));
    compCtx.globalAlpha = 1;

    // Prior bar (muted/hatched)
    const priY = MARGIN.top + plotH - ((Math.max(c.previous, 0) - yMin) / yRange) * plotH;
    const priH = Math.abs(((c.previous - 0) / yRange) * plotH);
    compCtx.fillStyle = config.color;
    compCtx.globalAlpha = 0.25;
    compCtx.fillRect(groupX + barW + 2, Math.min(priY, zero), barW, Math.max(priH, 1));
    compCtx.globalAlpha = 1;
    // Dashed outline on prior bar
    compCtx.strokeStyle = config.color;
    compCtx.lineWidth = 1;
    compCtx.setLineDash([3, 2]);
    compCtx.strokeRect(groupX + barW + 2, Math.min(priY, zero), barW, Math.max(priH, 1));
    compCtx.setLineDash([]);

    // Delta label above bars
    const deltaSign = c.delta >= 0 ? '+' : '';
    const deltaColor = c.delta >= 0 ? '#4ade80' : '#f87171';
    compCtx.fillStyle = deltaColor;
    compCtx.font = `bold 9px 'DM Mono', monospace`;
    compCtx.textAlign = 'center';
    const labelX = groupX + barW + 1;
    const labelY = Math.min(curY, priY) - 6;
    compCtx.fillText(deltaSign + fmtK(c.delta), labelX, labelY);

    // Group label (short name)
    compCtx.fillStyle = '#7a7870';
    compCtx.font = `9px 'DM Mono', monospace`;
    compCtx.textAlign = 'center';
    compCtx.fillText(config.periodLabel, labelX, H - MARGIN.bottom + 16);

    compHitBars.push({ x: groupX, w: barW * 2 + 2, key: k, config, data: c });
  });
}

let compHitBars = [];

compCanvas.addEventListener('mousemove', e => {
  const rect = compCanvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const hit = compHitBars.find(b => mx >= b.x && mx <= b.x + b.w + 20);
  if (hit) {
    const tt = document.getElementById('tooltip');
    document.getElementById('ttMonth').textContent = hit.config.label;
    const rows = document.getElementById('ttRows');
    rows.innerHTML = `
      <div class="tt-row"><span class="tt-label"><span class="tt-dot" style="background:${hit.config.color}"></span>Current MTD</span><span class="tt-val">${fmt(hit.data.current)}</span></div>
      <div class="tt-row"><span class="tt-label"><span class="tt-dot" style="background:${hit.config.color};opacity:0.4"></span>Prior same days</span><span class="tt-val">${fmt(hit.data.previous)}</span></div>
      <div class="tt-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:6px"><span class="tt-label">Delta</span><span class="tt-val" style="color:${hit.data.delta>=0?'#4ade80':'#f87171'}">${hit.data.delta>=0?'+':''}${fmt(hit.data.delta)}</span></div>
    `;
    let left = e.clientX + 16, top = e.clientY - 20;
    if (left + 280 > window.innerWidth - 8) left = e.clientX - 296;
    tt.style.left = left + 'px'; tt.style.top = top + 'px';
    tt.classList.add('visible');
  } else {
    hideTooltip();
  }
});
compCanvas.addEventListener('mouseleave', hideTooltip);

window.addEventListener('resize', () => { drawTrendChart(); drawComparisonChart(); });
loadAll();
</script>
