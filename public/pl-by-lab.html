<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L by Lab — Lincoln Labs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
button { outline: none; cursor: pointer; }
body { font-family: 'DM Mono', monospace; font-size: 0.82rem; background: #0f0f0e; color: #e8e6e0; }

/* ── Theme tokens on .shell ─────────────────────────────────────────────── */
.shell.dark  {
  --bg: #0f0f0e; --surface: #191917; --surfaceHigh: #1d1d1b;
  --border: #2a2a27; --text: #e8e6e0; --muted: #7a7870;
  --action: #4ade80; --neg: #f87171;
}
.shell.light {
  --bg: #f4f4f2; --surface: #ffffff; --surfaceHigh: #e8e7e3;
  --border: #c8c6c0; --text: #111110; --muted: #5a5850;
  --action: #15803d; --neg: #b91c1c;
}
.shell {
  padding: 40px 48px 64px;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background 0.2s, color 0.2s;
}

/* ── Header ─────────────────────────────────────────────────────────────── */
header {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
}
header h1 {
  font-family: 'Fraunces', serif; font-weight: 300;
  font-size: 2.4rem; letter-spacing: -0.02em; line-height: 1;
}
header h1 em { font-style: italic; color: var(--muted); }
header p { margin-top: 6px; font-size: 0.72rem; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }
.header-controls { display: flex; gap: 8px; align-items: center; flex-shrink: 0; margin-left: 24px; }
#themeBtn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; font-size: 14px;
}
#themeBtn:hover { border-color: var(--muted); }

/* ── Segmented controls ─────────────────────────────────────────────────── */
.seg-toggle { display: flex; }
.seg-btn {
  background: var(--surface); color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  padding: 6px 16px; letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid var(--border); transition: border-color 0.15s, color 0.15s;
}
.seg-btn + .seg-btn { border-left: none; }
.seg-btn.active { border-color: var(--muted); color: var(--text); }
.seg-btn.active + .seg-btn { border-left: 1px solid var(--border); }
.seg-btn:hover:not(.active) { color: var(--text); }
.seg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#refreshBtn { border-left: 1px solid var(--border) !important; }

/* ── Tab nav ────────────────────────────────────────────────────────────── */
.tab-nav {
  display: flex; border-bottom: 1px solid var(--border);
  margin-bottom: 32px; overflow-x: auto; scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 24px; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; margin-bottom: -1px; color: var(--muted);
  border-bottom: 2px solid transparent;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'DM Mono', monospace; transition: color 0.15s; white-space: nowrap;
}
.tab-btn.active { color: var(--text); border-bottom: 2px solid var(--text); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* ── KPI grid ────────────────────────────────────────────────────────────── */
.kpi-grid {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 16px; margin-bottom: 32px;
}
.kpi-card { background: var(--surface); padding: 18px 20px; border: 1px solid var(--border); }
.kpi-label {
  font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 400;
}
.kpi-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.kpi-value { font-family: 'Fraunces', serif; font-weight: 300; font-size: 2rem; letter-spacing: -0.02em; line-height: 1; }
.kpi-sub { font-size: 0.58rem; margin-top: 6px; color: var(--muted); font-family: 'DM Mono', monospace; line-height: 1.5; }

/* ── Controls row ────────────────────────────────────────────────────────── */
.controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 12px; }
.controls-title { font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.1rem; }

/* ── P&L table ───────────────────────────────────────────────────────────── */
.table-wrap { border: 1px solid var(--border); }
table { width: 100%; border-collapse: collapse; font-size: 0.74rem; }
thead th {
  padding: 9px 24px; font-size: 0.63rem; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); font-weight: 400; border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace; text-align: right;
}
thead th:first-child { text-align: left; width: 40%; }
tbody tr.data-row:hover td { background: var(--surfaceHigh); }
td { padding: 9px 24px; border-bottom: 1px solid var(--border); color: var(--text); }
td.label { color: var(--muted); padding-left: 32px; }
td.num { text-align: right; font-family: 'DM Mono', monospace; }
tr.section-hdr td {
  font-size: 0.63rem; letter-spacing: 0.09em; text-transform: uppercase;
  font-weight: 400; background: var(--surfaceHigh); padding: 10px 24px;
}
tr.subtotal td { background: var(--surfaceHigh); font-size: 0.74rem; }
tr.subtotal td.num { font-family: 'DM Mono', monospace; }
tr.net-row td {
  background: var(--surfaceHigh); padding: 13px 24px;
  font-family: 'Fraunces', serif; font-weight: 600; font-size: 0.9rem; text-align: right;
}
tr.net-row td:first-child { text-align: left; }
.pos { color: var(--action); }
.neg-val { color: var(--neg); }

/* ── State messages ─────────────────────────────────────────────────────── */
.state-msg { padding: 64px; text-align: center; color: var(--muted); }
.state-error { color: var(--neg); }

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .shell { padding: 24px 16px 48px; }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  header h1 { font-size: 1.8rem; }
  header { flex-direction: column; align-items: flex-start; gap: 16px; }
  .header-controls { margin-left: 0; }
}
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="shell dark" id="shell">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div>
      <h1>Lincoln Labs <em>P&amp;L</em></h1>
      <p id="subtitle">Loading…</p>
    </div>
    <div class="header-controls">
      <div class="seg-toggle" id="amToggle">
        <button class="seg-btn active" data-val="Accrual" onclick="setAM('Accrual')">Accrual</button>
        <button class="seg-btn"        data-val="Cash"    onclick="setAM('Cash')">Cash</button>
      </div>
      <button class="seg-btn" id="refreshBtn" onclick="load()">↺ Refresh</button>
      <button id="themeBtn" onclick="toggleTheme()">☀</button>
    </div>
  </header>

  <!-- ── BU Tabs ────────────────────────────────────────────────────────── -->
  <div class="tab-nav" id="tabNav"></div>

  <!-- ── KPI cards ─────────────────────────────────────────────────────── -->
  <div class="kpi-grid" id="kpiGrid">
    <div class="kpi-card" style="grid-column:1/-1;text-align:center;color:var(--muted)">Loading…</div>
  </div>

  <!-- ── Trend Chart ───────────────────────────────────────────────────── -->
  <div id="chartWrap"></div>

  <!-- ── Controls ──────────────────────────────────────────────────────── -->
  <div class="controls">
    <div class="controls-title">Profit &amp; Loss Statement</div>
    <div class="seg-toggle" id="periodToggle"></div>
  </div>

  <!-- ── P&L Table ─────────────────────────────────────────────────────── -->
  <div class="table-wrap" id="tableWrap">
    <div class="state-msg">Loading…</div>
  </div>

</div><!-- /.shell -->

<script>
(function () {
  'use strict';

  const SERIES = {
    'Apps':         '#f97316',
    'AwesomeAPI':   '#eab308',
    'Civille':      '#22c55e',
    'Lincoln Labs': '#06b6d4',
    'Truss':        '#a855f7',
    'Accomplice':   '#ec4899',
  };

  // ── State ─────────────────────────────────────────────────────────────────
  let data      = null;   // full API response
  let activeBU  = null;   // selected lab name
  let period    = null;   // number index into data.months, or 'ytd'
  let am        = 'Accrual';
  let isDark    = true;

  // ── Formatting ────────────────────────────────────────────────────────────
  const fd = n => {
    if (n == null || isNaN(n)) return '—';
    const a = Math.abs(n);
    const s = a.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    return n < 0 ? `(${s})` : s;
  };

  const kpiFmt = n => {
    if (n == null || isNaN(n)) return '—';
    const a = Math.abs(n);
    let s;
    if (a >= 1_000_000)     s = `$${(a / 1_000_000).toFixed(1)}M`;
    else if (a >= 100_000)  s = `$${Math.round(a / 1000)}K`;
    else if (a >= 1_000)    s = `$${Math.round(a).toLocaleString('en-US')}`;
    else                    s = `$${a.toFixed(0)}`;
    return n < 0 ? `(${s})` : s;
  };

  // ── Theme ─────────────────────────────────────────────────────────────────
  window.toggleTheme = function () {
    isDark = !isDark;
    const shell = document.getElementById('shell');
    shell.className = isDark ? 'shell dark' : 'shell light';
    document.getElementById('themeBtn').textContent = isDark ? '☀' : '☾';
    if (data) renderChart();
  };

  // ── Accounting method ──────────────────────────────────────────────────────
  window.setAM = function (val) {
    if (am === val) return;
    am = val;
    document.querySelectorAll('#amToggle .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.val === val);
    });
    load();
  };

  // ── Data helpers ───────────────────────────────────────────────────────────
  function sumItems(items, idx) {
    if (!items || !items.length) return 0;
    if (idx === 'ytd') return items.reduce((s, it) => s + it.values.reduce((a, b) => a + b, 0), 0);
    return items.reduce((s, it) => s + (it.values[idx] || 0), 0);
  }

  function getLabData() {
    return data?.labs?.[activeBU] || { income: [], cogs: [], expenses: [] };
  }

  function calcMetrics(labData, idx) {
    const inc  = sumItems(labData.income, idx);
    const cogs = sumItems(labData.cogs, idx);
    const gp   = inc - cogs;
    const exp  = sumItems(labData.expenses, idx);
    const net  = gp - exp;
    return {
      inc, cogs, gp, exp, net,
      gpPct:  inc ? (gp  / inc * 100) : null,
      netPct: inc ? (net / inc * 100) : null,
    };
  }

  // ── Subtitle ──────────────────────────────────────────────────────────────
  function updateSubtitle() {
    if (!data || !data.months.length) return;
    const months = data.months;
    const partial = data.partialMonths || [];
    let range;
    if (period === 'ytd') {
      range = months.length > 1 ? `${months[0]} – ${months[months.length - 1]}` : months[0];
      if (partial.includes(months.length - 1)) range += ' (MTD)';
    } else {
      range = months[period] || months[months.length - 1];
      if (partial.includes(period)) range += ' MTD';
    }
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('subtitle').textContent =
      `Business Unit View · ${range} · ${am} · as of ${today}`;
  }

  // ── Tab nav ────────────────────────────────────────────────────────────────
  function renderTabs() {
    document.getElementById('tabNav').innerHTML =
      (data?.labNames || []).map(lab =>
        `<button class="tab-btn${lab === activeBU ? ' active' : ''}" onclick="setTab('${lab.replace(/'/g, "\\'")}')">${lab}</button>`
      ).join('');
  }

  window.setTab = function (lab) {
    activeBU = lab;
    renderTabs();
    renderKPI();
    renderChart();
    renderTable();
  };

  // ── Period toggle ──────────────────────────────────────────────────────────
  function renderPeriodToggle() {
    if (!data || !data.months.length) {
      document.getElementById('periodToggle').innerHTML = '';
      return;
    }
    const months  = data.months;
    const partial = data.partialMonths || [];
    const shortLbl = m => m.split(' ')[0]; // "Jan 2026" → "Jan"
    let html = months.map((m, i) => {
      const lbl = partial.includes(i) ? `${shortLbl(m)}&thinsp;<span style="font-size:0.58em;opacity:0.7">MTD</span>` : shortLbl(m);
      return `<button class="seg-btn${period === i ? ' active' : ''}" onclick="setPeriod(${i})">${lbl}</button>`;
    }).join('');
    html += `<button class="seg-btn${period === 'ytd' ? ' active' : ''}" onclick="setPeriod('ytd')" style="border-left:1px solid var(--border)">YTD</button>`;
    document.getElementById('periodToggle').innerHTML = html;
  }

  window.setPeriod = function (idx) {
    period = idx;
    renderPeriodToggle();
    renderKPI();
    renderChart();
    renderTable();
    updateSubtitle();
  };

  // ── KPI cards ──────────────────────────────────────────────────────────────
  function renderKPI() {
    const el = document.getElementById('kpiGrid');
    if (!data) return;

    const labData = getLabData();
    const color   = SERIES[activeBU] || '#7a7870';
    const m       = calcMetrics(labData, period);
    const hasInc  = labData.income.length > 0;

    // MoM: only meaningful when a specific (non-first) month is selected
    let mom = null;
    if (typeof period === 'number' && period > 0) {
      const prev = calcMetrics(labData, period - 1);
      if (prev.net !== 0) mom = (m.net - prev.net) / Math.abs(prev.net) * 100;
    }

    const momLabel = typeof period === 'number' && period > 0
      ? `vs ${data.months[period - 1]}`
      : period === 'ytd' ? 'Full year' : 'First month';

    const kpis = hasInc ? [
      {
        label: 'Total Revenue',
        value: kpiFmt(m.inc),
        sub:   null,
        color,
      },
      {
        label: 'Gross Profit',
        value: kpiFmt(m.gp),
        sub:   m.gpPct != null ? `GP ${m.gpPct.toFixed(1)}%` : null,
        color: m.gp  >= 0 ? 'var(--action)' : 'var(--neg)',
      },
      {
        label: 'Net Income',
        value: kpiFmt(m.net),
        sub:   m.netPct != null ? `Net ${m.netPct.toFixed(1)}%` : null,
        color: m.net >= 0 ? 'var(--action)' : 'var(--neg)',
      },
      {
        label: 'MoM Net',
        value: mom != null ? `${mom >= 0 ? '+' : ''}${mom.toFixed(1)}%` : '—',
        sub:   momLabel,
        color: mom != null ? (mom >= 0 ? 'var(--action)' : 'var(--neg)') : 'var(--muted)',
      },
    ] : [
      { label: 'Total Expenses', value: kpiFmt(m.exp),                            sub: null,          color: 'var(--neg)'   },
      { label: 'Jan Expenses',   value: kpiFmt(sumItems(labData.expenses, 0)),    sub: null,          color: 'var(--muted)' },
      { label: 'YTD Expenses',   value: kpiFmt(sumItems(labData.expenses, 'ytd')), sub: null,         color: 'var(--muted)' },
      {
        label: 'MoM Change',
        value: mom != null ? `${mom >= 0 ? '+' : ''}${mom.toFixed(1)}%` : '—',
        sub: momLabel,
        color: mom != null ? (mom <= 0 ? 'var(--action)' : 'var(--neg)') : 'var(--muted)',
      },
    ];

    el.innerHTML = kpis.map(k => `
      <div class="kpi-card">
        <div class="kpi-label">
          <span class="kpi-dot" style="background:${k.color}"></span>
          <span style="color:${k.color}">${k.label}</span>
        </div>
        <div class="kpi-value" style="color:${k.color}">${k.value}</div>
        ${k.sub ? `<div class="kpi-sub">${k.sub}</div>` : ''}
      </div>`).join('');
  }

  // ── Trend chart ────────────────────────────────────────────────────────────
  function renderChart() {
    const el = document.getElementById('chartWrap');
    if (!data || !activeBU) { el.innerHTML = ''; return; }

    const labData = getLabData();
    const color   = SERIES[activeBU] || '#7a7870';
    const months  = data.months;
    const partial = data.partialMonths || [];
    const n       = months.length;
    const hasInc  = labData.income.length > 0;

    // Need at least one month with data
    const revenues = months.map((_, i) => hasInc ? sumItems(labData.income, i) : 0);
    const nets     = months.map((_, i) => {
      const inc  = sumItems(labData.income,   i);
      const cogs = sumItems(labData.cogs,     i);
      const exp  = sumItems(labData.expenses, i);
      return hasInc ? (inc - cogs - exp) : -exp;
    });

    const allHaveData = revenues.some(v => v !== 0) || nets.some(v => v !== 0);
    if (!allHaveData) { el.innerHTML = ''; return; }

    const dark = document.getElementById('shell').classList.contains('dark');
    const tc = dark
      ? { bg: '#191917', border: '#2a2a27', muted: '#7a7870', text: '#e8e6e0', action: '#4ade80', neg: '#f87171', zeroLine: '#3a3a37' }
      : { bg: '#ffffff', border: '#c8c6c0', muted: '#5a5850', text: '#111110', action: '#15803d', neg: '#b91c1c', zeroLine: '#a0a09a' };

    const W = 900, H = 200;
    const PL = 58, PR = 12, PT = 14, PB = 30;
    const chartW = W - PL - PR;
    const chartH = H - PT - PB;

    const allVals = [...revenues, ...nets];
    const maxVal  = Math.max(...allVals, 0);
    const minVal  = Math.min(...allVals, 0);
    const range   = (maxVal - minVal) || 1;

    const toY  = v => PT + chartH * (1 - (v - minVal) / range);
    const zeroY = toY(0);

    const barGroupW = chartW / n;
    const barW      = Math.max(Math.min(barGroupW * 0.28, 22), 4);

    // Y-axis grid & labels
    const ticks = [minVal, minVal + range * 0.25, minVal + range * 0.5, minVal + range * 0.75, maxVal];
    const fmtK  = v => {
      const a = Math.abs(v);
      if (a >= 1_000_000) return `$${(v / 1_000_000).toFixed(1)}M`;
      if (a >= 1_000)     return `$${Math.round(v / 1000)}K`;
      return `$${Math.round(v)}`;
    };

    let svg = `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible">`;

    // Grid lines + y-axis labels
    ticks.forEach(yVal => {
      const y = toY(yVal);
      svg += `<line x1="${PL}" y1="${y.toFixed(1)}" x2="${W - PR}" y2="${y.toFixed(1)}" stroke="${tc.border}" stroke-width="1"/>`;
      svg += `<text x="${PL - 6}" y="${(y + 3.5).toFixed(1)}" text-anchor="end" fill="${tc.muted}" font-size="9" font-family="DM Mono,monospace">${fmtK(yVal)}</text>`;
    });

    // Zero reference line (only if range spans negative)
    if (minVal < 0 && maxVal > 0) {
      svg += `<line x1="${PL}" y1="${zeroY.toFixed(1)}" x2="${W - PR}" y2="${zeroY.toFixed(1)}" stroke="${tc.zeroLine}" stroke-width="1" stroke-dasharray="3 3"/>`;
    }

    // Bars per month
    months.forEach((month, i) => {
      const cx       = PL + (i + 0.5) * barGroupW;
      const revVal   = revenues[i] || 0;
      const netVal   = nets[i] || 0;
      const isActive = typeof period === 'number' && period === i;
      const isMTD    = partial.includes(i);
      const opacity  = isActive || period === 'ytd' ? 1 : 0.45;

      // Revenue bar
      if (revVal !== 0) {
        const y1 = Math.min(toY(revVal), zeroY);
        const bH = Math.max(Math.abs(toY(revVal) - zeroY), 1);
        svg += `<rect x="${(cx - barW - 1.5).toFixed(1)}" y="${y1.toFixed(1)}" width="${barW}" height="${bH.toFixed(1)}" fill="${color}" opacity="${opacity}"/>`;
      }

      // Net income bar
      if (netVal !== 0) {
        const netColor = netVal >= 0 ? tc.action : tc.neg;
        const y1 = Math.min(toY(netVal), zeroY);
        const bH = Math.max(Math.abs(toY(netVal) - zeroY), 1);
        svg += `<rect x="${(cx + 1.5).toFixed(1)}" y="${y1.toFixed(1)}" width="${barW}" height="${bH.toFixed(1)}" fill="${netColor}" opacity="${opacity}"/>`;
      }

      // X-axis label
      const lbl        = month.split(' ')[0];
      const labelColor = isActive ? tc.text : tc.muted;
      svg += `<text x="${cx.toFixed(1)}" y="${H - 6}" text-anchor="middle" fill="${labelColor}" font-size="9" font-family="DM Mono,monospace">${lbl}${isMTD ? '*' : ''}</text>`;
    });

    svg += '</svg>';

    const legendItems = [
      { color, label: activeBU + ' Revenue' },
      { color: tc.action, label: 'Net Income' },
    ];
    const mtdNote = partial.length ? `<span style="font-size:0.6rem;color:${tc.muted}">* month-to-date</span>` : '';
    const legendHtml = `<div style="display:flex;gap:20px;margin-top:6px;padding-left:${PL}px;flex-wrap:wrap;align-items:center">
      ${legendItems.map(l => `
        <div style="display:flex;align-items:center;gap:6px">
          <span style="width:18px;height:2px;background:${l.color};display:inline-block;flex-shrink:0"></span>
          <span style="font-size:0.65rem;color:${tc.muted};font-family:'DM Mono',monospace">${l.label}</span>
        </div>`).join('')}
      ${mtdNote}
    </div>`;

    el.innerHTML = `<div style="background:var(--surface);border:1px solid var(--border);padding:20px 20px 12px;margin-bottom:24px">${svg}${legendHtml}</div>`;
  }

  // ── P&L table ─────────────────────────────────────────────────────────────
  function renderTable() {
    const el = document.getElementById('tableWrap');
    if (!data) { el.innerHTML = '<div class="state-msg">Loading…</div>'; return; }

    const labData = getLabData();
    const color   = SERIES[activeBU] || '#7a7870';
    const hasInc  = labData.income.length > 0;
    const hasCOGS = labData.cogs.length > 0;
    const months  = data.months;

    // Column headers and value extractors
    const isYTD    = period === 'ytd';
    const showCols = isYTD ? [...months, 'YTD'] : [months[period]];

    const itemVals = (item) => {
      if (isYTD) return [...item.values, item.values.reduce((a, b) => a + b, 0)];
      return [item.values[period] || 0];
    };

    const sumVals = (items) => {
      if (isYTD) {
        return [...months.map((_, mi) => sumItems(items, mi)), sumItems(items, 'ytd')];
      }
      return [sumItems(items, period)];
    };

    const gpVals = () => {
      if (isYTD) {
        return [
          ...months.map((_, mi) => sumItems(labData.income, mi) - sumItems(labData.cogs, mi)),
          sumItems(labData.income, 'ytd') - sumItems(labData.cogs, 'ytd'),
        ];
      }
      return [sumItems(labData.income, period) - sumItems(labData.cogs, period)];
    };

    const netVals = () => {
      const calc = (idx) => {
        const inc  = sumItems(labData.income, idx);
        const cogs = sumItems(labData.cogs, idx);
        const exp  = sumItems(labData.expenses, idx);
        return hasInc ? (inc - cogs - exp) : -exp;
      };
      if (isYTD) return [...months.map((_, mi) => calc(mi)), calc('ytd')];
      return [calc(period)];
    };

    const fmtCells = (vals, colorFn) =>
      vals.map(v => {
        const cls = colorFn ? colorFn(v) : (v < 0 ? 'neg-val' : '');
        return `<td class="num${cls ? ` ${cls}` : ''}">${fd(v)}</td>`;
      }).join('');

    const colSpan = 1 + showCols.length;
    const netV    = netVals();
    const netColor = netV[netV.length - 1] >= 0 ? 'var(--action)' : 'var(--neg)';

    let html = `<table>
      <thead><tr>
        <th style="text-align:left">Line Item</th>
        ${showCols.map(h => `<th>${h}</th>`).join('')}
      </tr></thead>
      <tbody>`;

    if (hasInc) {
      html += `<tr class="section-hdr"><td colspan="${colSpan}" style="color:${color}">Income</td></tr>`;
      labData.income.forEach(it => {
        html += `<tr class="data-row"><td class="label">${it.label}</td>${fmtCells(itemVals(it))}</tr>`;
      });
      html += `<tr class="subtotal"><td>Total Income</td>${fmtCells(sumVals(labData.income))}</tr>`;
    }

    if (hasCOGS) {
      html += `<tr class="section-hdr"><td colspan="${colSpan}" style="color:${color}">Cost of Goods Sold</td></tr>`;
      labData.cogs.forEach(it => {
        html += `<tr class="data-row"><td class="label">${it.label}</td>${fmtCells(itemVals(it))}</tr>`;
      });
      html += `<tr class="subtotal"><td>Total COGS</td>${fmtCells(sumVals(labData.cogs))}</tr>`;
      if (hasInc) {
        html += `<tr class="subtotal"><td>Gross Profit</td>${fmtCells(gpVals(), v => v >= 0 ? 'pos' : 'neg-val')}</tr>`;
      }
    }

    html += `<tr class="section-hdr"><td colspan="${colSpan}" style="color:${color}">Operating Expenses</td></tr>`;
    labData.expenses.forEach(it => {
      html += `<tr class="data-row"><td class="label">${it.label}</td>${fmtCells(itemVals(it))}</tr>`;
    });
    html += `<tr class="subtotal"><td>Total Expenses</td>${fmtCells(sumVals(labData.expenses))}</tr>`;
    html += `<tr class="net-row">
      <td style="color:${netColor};text-align:left">${hasInc ? 'Net Income' : 'Net (Expense)'}</td>
      ${fmtCells(netVals(), v => v >= 0 ? 'pos' : 'neg-val')}
    </tr>`;

    html += '</tbody></table>';
    el.innerHTML = html;
  }

  // ── Load data ──────────────────────────────────────────────────────────────
  window.load = async function () {
    const tableEl  = document.getElementById('tableWrap');
    const kpiEl    = document.getElementById('kpiGrid');
    const tabEl    = document.getElementById('tabNav');
    const periodEl = document.getElementById('periodToggle');
    const btn      = document.getElementById('refreshBtn');

    tableEl.innerHTML  = '<div class="state-msg">Loading…</div>';
    kpiEl.innerHTML    = '';
    tabEl.innerHTML    = '';
    periodEl.innerHTML = '';
    document.getElementById('chartWrap').innerHTML = '';
    btn.disabled       = true;

    try {
      const res = await fetch(`/api/pl-by-lab?accounting_method=${am}`);

      if (res.status === 401) {
        tableEl.innerHTML = '<div class="state-msg">Dashboard login required. <a href="/" style="color:var(--action)">Return home</a></div>';
        return;
      }
      if (res.status === 503) {
        tableEl.innerHTML = '<div class="state-msg">QuickBooks not connected. <a href="/auth/qbo-login" style="color:var(--action)">Reconnect →</a></div>';
        return;
      }
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        tableEl.innerHTML = `<div class="state-msg state-error">${j.detail || j.error || 'Error loading data.'}</div>`;
        return;
      }

      data = await res.json();

      if (!data.months || data.months.length === 0) {
        document.getElementById('subtitle').textContent = 'No completed months yet this year.';
        tableEl.innerHTML = '<div class="state-msg">No completed months available for the current year.</div>';
        return;
      }

      // Preserve active tab across refreshes; default to first lab
      if (!activeBU || !data.labNames.includes(activeBU)) {
        activeBU = data.labNames[0];
      }
      // Default to most recent completed month
      period = data.months.length - 1;

      renderTabs();
      renderPeriodToggle();
      renderKPI();
      renderChart();
      renderTable();
      updateSubtitle();

    } catch (e) {
      tableEl.innerHTML = `<div class="state-msg state-error">Error: ${e.message}</div>`;
    } finally {
      btn.disabled = false;
    }
  };

  // ── Init ───────────────────────────────────────────────────────────────────
  load();
})();
</script>
</body>
</html>
