<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P&L by Lab — Lincoln Labs</title>
<link rel="icon" type="image/png" href="/images/ll-favicon.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
/* Nav sits outside .shell — give it the same 48px inset as the Revenue page body */
#ll-nav { padding-left: 48px !important; padding-right: 48px !important; }
@media (max-width: 768px) { #ll-nav { padding-left: 16px !important; padding-right: 16px !important; } }
button { outline: none; cursor: pointer; }
a { color: inherit; }
body { font-family: 'DM Mono', monospace; font-size: 0.82rem; background: #0f0f0e; color: #e8e6e0; }

/* ── Theme tokens ──────────────────────────────────────────────────────────── */
.shell.dark {
  --bg: #0f0f0e; --surface: #191917; --surfaceHigh: #1d1d1b;
  --border: #2a2a27; --text: #e8e6e0; --muted: #7a7870;
  --action: #4ade80; --neg: #f87171; --tooltipBg: #111110;
}
.shell.light {
  --bg: #f4f4f2; --surface: #ffffff; --surfaceHigh: #e8e7e3;
  --border: #c8c6c0; --text: #111110; --muted: #5a5850;
  --action: #15803d; --neg: #b91c1c; --tooltipBg: #f0efe9;
}
.shell {
  padding: 40px 48px 80px;
  background: var(--bg); color: var(--text);
  min-height: 100vh; transition: background 0.2s, color 0.2s;
}

/* ── Header ────────────────────────────────────────────────────────────────── */
header {
  display: flex; justify-content: space-between; align-items: flex-start;
  margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
  gap: 24px; flex-wrap: wrap;
}
.header-left h1 {
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 2.2rem;
  letter-spacing: -0.02em; line-height: 1;
}
.header-left h1 em { font-style: italic; color: var(--muted); }
.header-subtitle {
  margin-top: 6px; font-size: 0.68rem; color: var(--muted);
  letter-spacing: 0.08em; text-transform: uppercase;
}

.header-right {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0; flex-wrap: wrap;
}

/* Global KPI pills in header */
.header-kpis {
  display: flex; gap: 6px; flex-wrap: wrap; margin-right: 8px;
}
.hkpi {
  background: var(--surface); border: 1px solid var(--border);
  padding: 6px 12px; display: flex; flex-direction: column; gap: 2px;
}
.hkpi-label {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--muted); font-family: 'DM Mono', monospace;
}
.hkpi-value {
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.1rem;
  letter-spacing: -0.01em; line-height: 1;
}

/* ── Segmented controls ──────────────────────────────────────────────────── */
.seg-toggle { display: flex; }
.seg-btn {
  background: var(--surface); color: var(--muted);
  font-family: 'DM Mono', monospace; font-size: 0.68rem;
  padding: 6px 14px; letter-spacing: 0.06em; text-transform: uppercase;
  border: 1px solid var(--border); transition: border-color 0.15s, color 0.15s;
}
.seg-btn + .seg-btn { border-left: none; }
.seg-btn.active { border-color: var(--muted); color: var(--text); }
.seg-btn.active + .seg-btn { border-left: 1px solid var(--border); }
.seg-btn:hover:not(.active):not(:disabled) { color: var(--text); }
.seg-btn:disabled { opacity: 0.4; cursor: not-allowed; }
#refreshBtn { border-left: 1px solid var(--border) !important; }

#themeBtn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}
#themeBtn:hover { border-color: var(--muted); }

/* ── Tab nav ──────────────────────────────────────────────────────────────── */
.tab-nav {
  display: flex; border-bottom: 1px solid var(--border);
  margin-bottom: 32px; overflow-x: auto; scrollbar-width: none;
}
.tab-nav::-webkit-scrollbar { display: none; }
.tab-btn {
  padding: 10px 20px; font-size: 0.72rem; letter-spacing: 0.06em; text-transform: uppercase;
  cursor: pointer; margin-bottom: -1px; color: var(--muted);
  border-bottom: 2px solid transparent;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: 'DM Mono', monospace; transition: color 0.15s; white-space: nowrap;
}
.tab-btn.active { color: var(--text); border-bottom: 2px solid var(--text); }
.tab-btn:hover:not(.active) { color: var(--text); }
.tab-btn .warn-prefix { color: var(--muted); margin-right: 2px; }

/* ── Section label ────────────────────────────────────────────────────────── */
.section-label {
  font-size: 0.63rem; text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--muted); margin-bottom: 12px; font-family: 'DM Mono', monospace;
}
.section-gap { margin-bottom: 40px; }

/* ── KPI strip ────────────────────────────────────────────────────────────── */
.kpi-strip {
  display: flex; gap: 0; margin-bottom: 32px; border: 1px solid var(--border);
}
.kpi-card {
  flex: 1; background: var(--surface); padding: 18px 20px;
  border-right: 1px solid var(--border);
}
.kpi-card:last-child { border-right: none; }
.kpi-label {
  font-size: 0.62rem; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 8px; display: flex; align-items: center; gap: 6px; font-weight: 400;
  color: var(--muted);
}
.kpi-value {
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 1.9rem;
  letter-spacing: -0.02em; line-height: 1;
}

/* ── Overview summary KPI grid (6 cols) ──────────────────────────────────── */
.kpi-grid-7 {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 16px; margin-bottom: 32px;
}
.kpi-grid-7 .kpi-card {
  border: 1px solid var(--border); border-right: 1px solid var(--border); flex: none;
}

/* ── Table ────────────────────────────────────────────────────────────────── */
.table-wrap { border: 1px solid var(--border); overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.74rem; min-width: 600px; }
thead th {
  padding: 9px 16px; font-size: 0.63rem; letter-spacing: 0.09em; text-transform: uppercase;
  color: var(--muted); font-weight: 400; border-bottom: 1px solid var(--border);
  font-family: 'DM Mono', monospace; text-align: right; white-space: nowrap;
  background: var(--surface);
}
thead th:first-child { text-align: left; width: 38%; }
tbody tr:last-child td { border-bottom: none; }
td { padding: 8px 16px; border-bottom: 1px solid var(--border); color: var(--text); }
td.lbl { color: var(--muted); padding-left: 28px; }
td.lbl-subtotal { padding-left: 24px; font-weight: 500; }
td.lbl-plain { padding-left: 16px; }
td.num { text-align: right; font-family: 'DM Mono', monospace; white-space: nowrap; }
td.pos { color: var(--action); }
td.neg-val { color: var(--neg); }

/* Row types */
tr.t-section-hdr td {
  font-size: 0.63rem; letter-spacing: 0.09em; text-transform: uppercase;
  font-weight: 400; background: var(--surfaceHigh); padding: 9px 16px; color: var(--muted);
}
tr.t-section-hdr td:first-child { padding-left: 16px; }
tr.t-subtotal td { background: var(--surfaceHigh); }
tr.t-total-income td { background: var(--surfaceHigh); }
tr.t-total-income td.lbl-plain { color: var(--text); font-weight: 500; }
tr.t-total-income td.num { color: var(--action); }
tr.t-total-cogs td { background: var(--surfaceHigh); }
tr.t-total-cogs td.lbl-plain { color: var(--text); font-weight: 500; }
tr.t-gross-profit td {
  background: var(--surfaceHigh);
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 0.85rem;
}
tr.t-gross-profit td.num.pos,
tr.t-gross-profit td.num { color: var(--action); }
tr.t-gross-profit td.neg-val { color: var(--neg); }
tr.t-total-expenses td { background: var(--surfaceHigh); }
tr.t-total-expenses td.lbl-plain { color: var(--text); font-weight: 500; }
tr.t-net-op td {
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 0.85rem;
  background: var(--surfaceHigh);
}
tr.t-net-income td {
  font-family: 'Fraunces', serif; font-weight: 300; font-size: 1rem;
  background: var(--surfaceHigh); border-bottom: 2px solid var(--border);
}
tr.t-row:hover td { background: var(--surfaceHigh); }

/* Total row in BU table */
tr.t-bu-total td {
  background: var(--surfaceHigh); font-weight: 500; color: var(--text);
  border-top: 1px solid var(--border);
}
tr.t-bu-passthrough td.lbl { color: var(--muted); font-style: italic; }

/* ── State messages ──────────────────────────────────────────────────────── */
.state-msg { padding: 64px 24px; text-align: center; color: var(--muted); font-size: 0.82rem; }
.state-error { color: var(--neg); }
.state-link { color: var(--action); text-decoration: none; }
.state-link:hover { text-decoration: underline; }

/* ── Lab subtitle ──────────────────────────────────────────────────────────── */
.lab-subtitle {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--muted); margin-bottom: 16px;
}

/* ── Unassigned tab ──────────────────────────────────────────────────────── */
.unassigned-header {
  font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.09em;
  color: var(--muted); margin-bottom: 24px; padding: 12px 16px;
  border: 1px solid var(--border); background: var(--surface);
}

/* ── Date range picker ───────────────────────────────────────────────────── */
.date-range {
  display: flex; align-items: center; gap: 0; flex-shrink: 0;
}
.date-range label {
  font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.07em;
  color: var(--muted); padding: 0 8px; white-space: nowrap;
  pointer-events: none;
}
.date-input {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  font-family: 'DM Mono', monospace; font-size: 0.72rem;
  padding: 6px 10px; height: 36px; outline: none;
  color-scheme: dark;
}
.shell.light .date-input { color-scheme: light; }
.date-input:focus { border-color: var(--muted); }
.date-input + .date-input { border-left: none; }
.date-sep {
  background: var(--surface); border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border); border-left: none; border-right: none;
  color: var(--muted); font-size: 0.65rem; padding: 6px 2px; height: 36px;
  display: flex; align-items: center;
}

/* ── Responsive ─────────────────────────────────────────────────────────── */
@media (max-width: 900px) {
  .kpi-grid-7 { grid-template-columns: repeat(3, 1fr); }
}
@media (max-width: 768px) {
  .shell { padding: 24px 16px 48px; }
  .kpi-grid-7 { grid-template-columns: repeat(2, 1fr); }
  .kpi-strip { flex-wrap: wrap; }
  .kpi-strip .kpi-card { flex: 1 1 calc(50% - 0px); border-right: 1px solid var(--border); }
  header { flex-direction: column; }
  .header-right { width: 100%; }
  .header-kpis { display: none; }
}
</style>
</head>
<body>
<script src="/nav.js"></script>
<div class="shell dark" id="shell">

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header>
    <div class="header-left">
      <h1>Lincoln Labs <em>P&amp;L</em></h1>
      <p class="header-subtitle" id="subtitle">Loading…</p>
    </div>
    <div class="header-right">
      <div class="header-kpis" id="headerKpis"></div>
      <div class="date-range">
        <input type="date" id="dateStart" class="date-input" onchange="onDateChange()">
        <span class="date-sep">–</span>
        <input type="date" id="dateEnd" class="date-input" onchange="onDateChange()">
      </div>
      <div class="seg-toggle" id="amToggle">
        <button class="seg-btn active" data-val="Accrual" onclick="setAM('Accrual')">Accrual</button>
        <button class="seg-btn"        data-val="Cash"    onclick="setAM('Cash')">Cash</button>
      </div>
      <button class="seg-btn" id="refreshBtn" onclick="load()">↺ Refresh</button>
      <button id="themeBtn" onclick="toggleTheme()">☀</button>
    </div>
  </header>

  <!-- ── Tab nav ────────────────────────────────────────────────────────── -->
  <div class="tab-nav" id="tabNav"></div>

  <!-- ── Tab content ───────────────────────────────────────────────────── -->
  <div id="tabContent">
    <div class="state-msg">Loading…</div>
  </div>

</div><!-- /.shell -->

<script>
(function () {
  'use strict';

  const LAB_COLORS = {
    'Civille':      '#22c55e',
    'Truss':        '#a855f7',
    'AwesomeAPI':   '#eab308',
    'Apps':         '#f97316',
    'Lincoln Labs': '#06b6d4',
    'Unassigned':   '#7a7870',
  };

  const TABS = ['Overview', 'Civille', 'Truss', 'AwesomeAPI', 'Apps', 'Lincoln Labs Co.', 'Unassigned'];

  // ── Default date range helpers ────────────────────────────────────────────
  function defaultDateRange() {
    const today = new Date();
    const year  = today.getFullYear();
    const month = today.getMonth() + 1; // 1-indexed

    const startStr = `${year}-01-01`;

    let endStr;
    if (month > 1) {
      const lastCompleted = month - 1;
      const lastDay = new Date(year, lastCompleted, 0).getDate();
      endStr = `${year}-${String(lastCompleted).padStart(2,'0')}-${String(lastDay).padStart(2,'0')}`;
    } else {
      // January: use today as end
      const d = today.getDate();
      endStr = `${year}-01-${String(d).padStart(2,'0')}`;
    }
    return { startStr, endStr };
  }

  // ── State ─────────────────────────────────────────────────────────────────
  let data      = null;
  let activeTab = 'Overview';
  let am        = 'Accrual';
  let isDark    = true;

  const { startStr: _ds, endStr: _de } = defaultDateRange();
  let dateStart = _ds;
  let dateEnd   = _de;

  // ── Formatting ────────────────────────────────────────────────────────────
  function fmtDollar(n) {
    if (n == null || isNaN(n)) return '—';
    if (Math.abs(n) < 0.5) return '—';
    const a = Math.abs(n);
    const s = '$' + Math.round(a).toLocaleString('en-US');
    return n < 0 ? `(${s})` : s;
  }

  function fmtPct(n) {
    if (n == null || isNaN(n)) return '—';
    return n.toFixed(1) + '%';
  }

  function fmtKPI(n) {
    if (n == null || isNaN(n)) return '—';
    const a = Math.abs(n);
    let s;
    if (a >= 1_000_000)    s = '$' + (a / 1_000_000).toFixed(2) + 'M';
    else if (a >= 100_000) s = '$' + Math.round(a / 1000) + 'K';
    else                   s = '$' + Math.round(a).toLocaleString('en-US');
    return n < 0 ? `(${s})` : s;
  }

  function sum(arr) { return (arr || []).reduce((a, b) => a + b, 0); }

  function periodLabel(months) {
    if (!months || months.length === 0) return 'Period Total';
    if (months.length === 1) return months[0];
    const first = months[0].split(' ')[0];
    const last  = months[months.length - 1];
    return `${first}–${last} Total`;
  }

  // ── Theme ─────────────────────────────────────────────────────────────────
  window.toggleTheme = function () {
    isDark = !isDark;
    document.getElementById('shell').className = isDark ? 'shell dark' : 'shell light';
    document.getElementById('themeBtn').textContent = isDark ? '☀' : '☾';
  };

  // ── Date range change ──────────────────────────────────────────────────────
  window.onDateChange = function () {
    const s = document.getElementById('dateStart').value;
    const e = document.getElementById('dateEnd').value;
    if (!s || !e || s > e) return; // wait until both are valid
    dateStart = s;
    dateEnd   = e;
    load();
  };

  // ── Accounting method ──────────────────────────────────────────────────────
  window.setAM = function (val) {
    if (am === val) return;
    am = val;
    document.querySelectorAll('#amToggle .seg-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.val === val);
    });
    load();
  };

  // ── Subtitle ──────────────────────────────────────────────────────────────
  function updateSubtitle() {
    if (!data) return;
    const months  = data.months;
    const partial = data.partialMonths || [];
    let range;
    if (months.length === 1) {
      range = months[0];
    } else {
      range = `${months[0]} – ${months[months.length - 1]}`;
    }
    if (partial.includes(months.length - 1)) range += ' (MTD)';
    const today = new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    document.getElementById('subtitle').textContent =
      `${range} · ${am} Basis · as of ${today}`;
  }

  // ── Header KPI pills ───────────────────────────────────────────────────────
  function renderHeaderKPIs() {
    const el = document.getElementById('headerKpis');
    if (!data) { el.innerHTML = ''; return; }
    const s = data.summary;
    const totalRev = sum(s.totalIncome);
    const gp       = sum(s.grossProfit);
    const net      = sum(s.netIncome);
    const gm       = totalRev ? gp / totalRev * 100 : null;

    const pills = [
      { label: 'Total Revenue', value: fmtKPI(totalRev), color: 'var(--action)' },
      { label: 'Gross Profit',  value: fmtKPI(gp),       color: 'var(--action)' },
      { label: 'Net Income',    value: fmtKPI(net),       color: net >= 0 ? 'var(--action)' : 'var(--neg)' },
      { label: 'Gross Margin',  value: fmtPct(gm),        color: 'var(--muted)' },
    ];

    el.innerHTML = pills.map(p => `
      <div class="hkpi">
        <div class="hkpi-label">${p.label}</div>
        <div class="hkpi-value" style="color:${p.color}">${p.value}</div>
      </div>`).join('');
  }

  // ── Tab nav ────────────────────────────────────────────────────────────────
  function renderTabs() {
    document.getElementById('tabNav').innerHTML = TABS.map(tab => {
      const isActive = tab === activeTab;
      const label = tab === 'Unassigned'
        ? `<span class="warn-prefix">⚠</span>${tab}`
        : tab;
      return `<button class="tab-btn${isActive ? ' active' : ''}" onclick="setTab('${tab.replace(/'/g,"\\'")}')">
        ${label}
      </button>`;
    }).join('');
  }

  window.setTab = function (tab) {
    activeTab = tab;
    renderTabs();
    renderTabContent();
  };

  // ── Tab content dispatcher ─────────────────────────────────────────────────
  function renderTabContent() {
    const el = document.getElementById('tabContent');
    if (!data) { el.innerHTML = '<div class="state-msg">Loading…</div>'; return; }
    switch (activeTab) {
      case 'Overview':         el.innerHTML = renderOverview(); break;
      case 'Civille':          el.innerHTML = renderLabTab('Civille'); break;
      case 'Truss':            el.innerHTML = renderTrussTab(); break;
      case 'AwesomeAPI':       el.innerHTML = renderLabTab('AwesomeAPI'); break;
      case 'Apps':             el.innerHTML = renderLabTab('Apps'); break;
      case 'Lincoln Labs Co.': el.innerHTML = renderLabTab('Lincoln Labs'); break;
      case 'Unassigned':       el.innerHTML = renderUnassignedTab(); break;
      default:                 el.innerHTML = '<div class="state-msg">Tab not found.</div>';
    }
  }

  // ── PL table builder ───────────────────────────────────────────────────────
  function buildPLTable(rows, months, partialMonths) {
    const N       = months.length;
    const totLbl  = periodLabel(months);
    const partial = partialMonths || [];

    const monthHdrs = months.map((m, i) => {
      const short = m.split(' ')[0];
      const mtd   = partial.includes(i) ? '<span style="font-size:0.55em;opacity:0.7"> MTD</span>' : '';
      return `<th>${short}${mtd}</th>`;
    }).join('');

    let html = `<div class="table-wrap">
    <table>
    <thead><tr>
      <th style="text-align:left">Line Item</th>
      ${monthHdrs}
      <th>${totLbl}</th>
    </tr></thead>
    <tbody>`;

    for (const row of rows) {
      if (row.type === 'section_header') {
        const colSpan = N + 2;
        html += `<tr class="t-section-hdr"><td colspan="${colSpan}">${escH(row.label)}</td></tr>`;
        continue;
      }

      const vals    = row.values || [];
      const total   = sum(vals);
      const trClass = rowTrClass(row.type);

      let labelClass = 'lbl-plain';
      if (row.type === 'row')      labelClass = 'lbl';
      if (row.type === 'subtotal') labelClass = 'lbl-subtotal';

      const numCells = months.map((_, i) => {
        const v   = vals[i] || 0;
        const cls = numClass(v, row.type);
        return `<td class="num${cls}">${fmtDollar(v)}</td>`;
      }).join('');

      const totalCls = numClass(total, row.type);
      const totalCell = `<td class="num${totalCls}">${fmtDollar(total)}</td>`;

      html += `<tr class="${trClass}${row.type === 'row' ? ' t-row' : ''}">
        <td class="${labelClass}">${escH(row.label)}</td>
        ${numCells}
        ${totalCell}
      </tr>`;
    }

    html += '</tbody></table></div>';
    return html;
  }

  function rowTrClass(type) {
    switch (type) {
      case 'section_header': return 't-section-hdr';
      case 'subtotal':       return 't-subtotal';
      case 'total_income':   return 't-total-income';
      case 'total_cogs':     return 't-total-cogs';
      case 'gross_profit':   return 't-gross-profit';
      case 'total_expenses': return 't-total-expenses';
      case 'net_op':         return 't-net-op';
      case 'net_income':     return 't-net-income';
      default:               return 't-row';
    }
  }

  function numClass(v, type) {
    if (v == null || isNaN(v) || Math.abs(v) < 0.5) return '';
    if (type === 'gross_profit' || type === 'net_op' || type === 'net_income') {
      return v >= 0 ? ' pos' : ' neg-val';
    }
    if (type === 'total_income') return ' pos';
    if (v < 0) return ' neg-val';
    return '';
  }

  function escH(s) {
    return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── KPI strip builder ──────────────────────────────────────────────────────
  function buildKPIStrip(kpis) {
    // kpis: [{label, value, color}]
    return `<div class="kpi-strip">
      ${kpis.map(k => `
        <div class="kpi-card">
          <div class="kpi-label" style="color:${k.color || 'var(--muted)'}">${escH(k.label)}</div>
          <div class="kpi-value" style="color:${k.color || 'var(--text)'}">${escH(String(k.value))}</div>
        </div>`).join('')}
    </div>`;
  }

  // ── OVERVIEW TAB ──────────────────────────────────────────────────────────
  function renderOverview() {
    const months  = data.months;
    const partial = data.partialMonths || [];
    const s       = data.summary;
    const N       = months.length;

    // Period range label
    const first = months[0];
    const last  = months[months.length - 1];
    const rangeLabel = months.length === 1
      ? first
      : `${first.split(' ')[0]}–${last}`;

    // Summary KPIs
    const totInc = sum(s.totalIncome);
    const totCOGS = sum(s.totalCOGS);
    const gp      = sum(s.grossProfit);
    const gm      = totInc ? gp / totInc * 100 : null;
    const totExp  = sum(s.totalExpenses);
    const netOp   = sum(s.netOpIncome);
    const netInc  = sum(s.netIncome);

    const summaryKPIs = [
      { label: 'Total Revenue',    value: fmtKPI(totInc),  color: 'var(--action)' },
      { label: 'Total COGS',       value: fmtKPI(totCOGS), color: 'var(--text)' },
      { label: 'Gross Profit',     value: fmtKPI(gp),      color: gp >= 0 ? 'var(--action)' : 'var(--neg)' },
      { label: 'Gross Margin',     value: fmtPct(gm),      color: 'var(--muted)' },
      { label: 'Total Expenses',   value: fmtKPI(totExp),  color: 'var(--text)' },
      { label: 'Net Income',       value: fmtKPI(netInc),  color: netInc >= 0 ? 'var(--action)' : 'var(--neg)' },
    ];

    // Section 1: Company Summary
    let html = `<div class="section-gap">
      <div class="section-label">${escH(rangeLabel)} · Company Summary</div>
      <div class="kpi-grid-7">
        ${summaryKPIs.map(k => `
          <div class="kpi-card" style="border:1px solid var(--border)">
            <div class="kpi-label">${escH(k.label)}</div>
            <div class="kpi-value" style="color:${k.color}">${escH(String(k.value))}</div>
          </div>`).join('')}
      </div>
    </div>`;

    // Section 2: By Business Unit table
    const buRows = data.buRows || [];

    // Compute totals for BU table footer
    let totalRev = 0, totalCOGS = 0, totalGP = 0;
    buRows.forEach(r => {
      totalRev  += r.totalRevenue || 0;
      totalCOGS += r.totalCOGS   || 0;
      totalGP   += r.grossProfit || 0;
    });
    // Also need per-month totals
    const monthRevTotals = Array(N).fill(0);
    buRows.forEach(r => {
      (r.monthRevenue || []).forEach((v, i) => { monthRevTotals[i] += v || 0; });
    });
    const totalGM = totalRev ? totalGP / totalRev * 100 : null;

    const totLbl  = periodLabel(months);
    const monthHdrs = months.map((m, i) => {
      const short = m.split(' ')[0];
      const mtdMark = partial.includes(i) ? '<span style="font-size:0.55em;opacity:0.7"> MTD</span>' : '';
      return `<th>${short}${mtdMark} Rev</th>`;
    }).join('');

    html += `<div class="section-gap">
      <div class="section-label">By Business Unit</div>
      <div class="table-wrap">
      <table>
      <thead><tr>
        <th style="text-align:left">Business Unit</th>
        ${monthHdrs}
        <th>Total Revenue</th>
        <th>Total COGS</th>
        <th>Gross Profit</th>
        <th>GM %</th>
      </tr></thead>
      <tbody>`;

    buRows.forEach(r => {
      const isPassThrough = r.trussSubType === 'passthrough';
      const labKey = r.name.includes('Civille') ? 'Civille'
                   : r.name.includes('Phantom')  ? 'Phantom Copy'
                   : r.name.includes('Truss')     ? 'Truss'
                   : r.name.includes('Awesome')   ? 'AwesomeAPI'
                   : r.name.includes('Apps')      ? 'Apps'
                   : r.name.includes('Lincoln')   ? 'Lincoln Labs'
                   : null;
      const dotColor = labKey ? (LAB_COLORS[labKey] || 'var(--muted)') : 'var(--muted)';

      const monthCells = (r.monthRevenue || []).map(v =>
        `<td class="num">${fmtDollar(v)}</td>`
      ).join('');

      const gmCell = r.gmPct != null
        ? `<td class="num${r.gmPct >= 20 ? ' pos' : ''}">${fmtPct(r.gmPct)}</td>`
        : `<td class="num">—</td>`;

      const rowClass = isPassThrough ? 't-bu-passthrough' : '';
      const labelStyle = isPassThrough ? 'style="font-style:italic;color:var(--muted)"' : '';

      html += `<tr class="t-row ${rowClass}">
        <td class="lbl">
          <span style="display:inline-block;width:7px;height:7px;border-radius:50%;background:${dotColor};margin-right:8px;vertical-align:middle;flex-shrink:0"></span>
          <span ${labelStyle}>${escH(r.name)}</span>
        </td>
        ${monthCells}
        <td class="num">${fmtDollar(r.totalRevenue)}</td>
        <td class="num">${fmtDollar(r.totalCOGS)}</td>
        <td class="num${r.grossProfit >= 0 ? ' pos' : ' neg-val'}">${fmtDollar(r.grossProfit)}</td>
        ${gmCell}
      </tr>`;
    });

    // Total row
    const totalMonthCells = monthRevTotals.map(v => `<td class="num">${fmtDollar(v)}</td>`).join('');
    html += `<tr class="t-bu-total">
      <td class="lbl-plain" style="font-weight:500">Total</td>
      ${totalMonthCells}
      <td class="num pos">${fmtDollar(totalRev)}</td>
      <td class="num">${fmtDollar(totalCOGS)}</td>
      <td class="num${totalGP >= 0 ? ' pos' : ' neg-val'}">${fmtDollar(totalGP)}</td>
      <td class="num">${fmtPct(totalGM)}</td>
    </tr>`;

    html += `</tbody></table></div></div>`;

    // Section 3: Monthly P&L Summary — exclude net_op (same as net_income)
    const fullRows = (data.fullPLRows || []).filter(r => r.type !== 'net_op');
    html += `<div class="section-gap">
      <div class="section-label">Monthly P&amp;L Summary</div>
      ${buildPLTable(fullRows, months, partial)}
    </div>`;

    return html;
  }

  // ── LAB TAB ───────────────────────────────────────────────────────────────
  function renderLabTab(labKey) {
    const labData = data.labs && data.labs[labKey];
    if (!labData) return `<div class="state-msg">No data for ${escH(labKey)}.</div>`;

    const months  = data.months;
    const partial = data.partialMonths || [];
    const color   = LAB_COLORS[labKey] || 'var(--muted)';
    const kpis    = labData.kpis || {};

    let html = '';

    // Subtitle
    if (labData.subtitle) {
      html += `<div class="lab-subtitle" style="color:${color}">${escH(labKey.toUpperCase())} — ${escH(labData.subtitle.toUpperCase())}</div>`;
    }

    // KPI strip
    const kpiDefs = labKey === 'Truss' ? [] : [
      { label: 'Revenue',        value: fmtKPI(kpis.revenue),       color },
      { label: 'COGS',           value: fmtKPI(kpis.cogs),          color: 'var(--text)' },
      { label: 'Gross Profit',   value: fmtKPI(kpis.grossProfit),   color: kpis.grossProfit >= 0 ? 'var(--action)' : 'var(--neg)' },
      { label: 'Gross Margin',   value: fmtPct(kpis.gmPct),         color: 'var(--muted)' },
      { label: 'Total Expenses', value: fmtKPI(kpis.totalExpenses), color: 'var(--text)' },
      { label: 'Net Income (Est.)', value: fmtKPI(kpis.netOpIncome), color: kpis.netOpIncome >= 0 ? 'var(--action)' : 'var(--neg)' },
    ];

    if (kpiDefs.length > 0) {
      html += buildKPIStrip(kpiDefs);
    }

    // P&L table
    html += buildPLTable(labData.rows || [], months, partial);

    return html;
  }

  // ── TRUSS TAB ─────────────────────────────────────────────────────────────
  function renderTrussTab() {
    const labData = data.labs && data.labs['Truss'];
    if (!labData) return '<div class="state-msg">No Truss data.</div>';

    const months  = data.months;
    const partial = data.partialMonths || [];
    const color   = LAB_COLORS['Truss'];
    const kpis    = labData.kpis || {};

    const kpiDefs = [
      { label: 'Total Revenue',      value: fmtKPI(kpis.totalRevenue),    color },
      { label: 'Service Fees Rev',   value: fmtKPI(kpis.serviceFeesRev),  color: 'var(--text)' },
      { label: 'Pass-Through Rev',   value: fmtKPI(kpis.passThroughRev),  color: 'var(--muted)' },
      { label: 'Total COGS',         value: fmtKPI(kpis.totalCOGS),       color: 'var(--text)' },
      { label: 'Gross Profit',       value: fmtKPI(kpis.grossProfit),      color: kpis.grossProfit >= 0 ? 'var(--action)' : 'var(--neg)' },
      { label: 'Gross Margin',       value: fmtPct(kpis.gmPct),            color: 'var(--muted)' },
    ];

    let html = buildKPIStrip(kpiDefs);
    html += buildPLTable(labData.rows || [], months, partial);
    return html;
  }

  // ── UNASSIGNED TAB ────────────────────────────────────────────────────────
  function renderUnassignedTab() {
    const u = data.unassigned;
    if (!u) return '<div class="state-msg">No unassigned data.</div>';

    const months  = data.months;
    const partial = data.partialMonths || [];
    const kpis    = u.kpis || {};

    let html = `<div class="unassigned-header">
      Items Without Lab Attribution — Review Required
    </div>`;

    const kpiDefs = [
      { label: 'Untagged Income',       value: fmtKPI(kpis.untaggedIncome),      color: 'var(--muted)' },
      { label: 'Untagged Expenses',     value: fmtKPI(kpis.untaggedExpenses),    color: 'var(--neg)' },
      { label: 'Reconciliation Items',  value: fmtKPI(kpis.reconciliationItems), color: 'var(--muted)' },
      { label: 'Total to Classify',     value: fmtKPI(kpis.totalToClassify),     color: kpis.totalToClassify > 0 ? 'var(--neg)' : 'var(--muted)' },
    ];

    html += buildKPIStrip(kpiDefs);

    // Build combined rows
    const rows = [];
    if ((u.incomeRows || []).length > 0) {
      rows.push({ label: 'UNTAGGED INCOME', type: 'section_header' });
      u.incomeRows.forEach(r => rows.push({ label: r.label, values: r.values, type: 'row' }));
    }
    if ((u.expenseRows || []).length > 0) {
      rows.push({ label: 'UNTAGGED EXPENSES', type: 'section_header' });
      u.expenseRows.forEach(r => rows.push({ label: r.label, values: r.values, type: 'row' }));
    }

    if (rows.length > 0) {
      html += buildPLTable(rows, months, partial);
    } else {
      html += '<div class="state-msg" style="padding:32px">No untagged items found.</div>';
    }

    return html;
  }

  // ── Load data ──────────────────────────────────────────────────────────────
  window.load = async function () {
    const contentEl = document.getElementById('tabContent');
    const btn       = document.getElementById('refreshBtn');

    // Sync date inputs to current state
    const dsEl = document.getElementById('dateStart');
    const deEl = document.getElementById('dateEnd');
    if (dsEl.value !== dateStart) dsEl.value = dateStart;
    if (deEl.value !== dateEnd)   deEl.value = dateEnd;

    contentEl.innerHTML = '<div class="state-msg">Loading…</div>';
    document.getElementById('tabNav').innerHTML = '';
    document.getElementById('headerKpis').innerHTML = '';
    btn.disabled = true;

    try {
      const res = await fetch(`/api/pl-by-lab?accounting_method=${am}&start_date=${dateStart}&end_date=${dateEnd}`);

      if (res.status === 401) {
        contentEl.innerHTML = `<div class="state-msg">Dashboard login required. <a href="/" class="state-link">Return home</a></div>`;
        document.getElementById('subtitle').textContent = '';
        return;
      }
      if (res.status === 503) {
        contentEl.innerHTML = `<div class="state-msg">QuickBooks not connected. <a href="/auth/qbo-login" class="state-link">Reconnect →</a></div>`;
        document.getElementById('subtitle').textContent = 'QuickBooks not connected';
        return;
      }
      if (!res.ok) {
        const j = await res.json().catch(() => ({}));
        contentEl.innerHTML = `<div class="state-msg state-error">${escH(j.detail || j.error || 'Error loading data.')}</div>`;
        return;
      }

      data = await res.json();

      if (!data.months || data.months.length === 0) {
        document.getElementById('subtitle').textContent = 'No data available for the current year.';
        contentEl.innerHTML = '<div class="state-msg">No month data available.</div>';
        return;
      }

      updateSubtitle();
      renderHeaderKPIs();
      renderTabs();
      renderTabContent();

    } catch (e) {
      contentEl.innerHTML = `<div class="state-msg state-error">Error: ${escH(e.message)}</div>`;
    } finally {
      btn.disabled = false;
    }
  };

  // ── Init ───────────────────────────────────────────────────────────────────
  load();
})();
</script>
</body>
</html>
